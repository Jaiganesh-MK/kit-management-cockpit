[theme]
primaryColor = "#A100FF"
backgroundColor = "#F1F0F4"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[client]
toolbarMode = "minimal"
showSidebarNavigation = false

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
